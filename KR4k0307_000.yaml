body:
  text: 乾隆休妻民國陳蓮痕著目録一抱不平評論積習二意相左帝後反目三體仁宮猝然驚豔四承恩澤玉妃專寵五因嫉忌後妃交謫六逞才華奏參寵姬七結深怨臥薪嘗膽八布迷陳瘟生入彀九施暴力豪仆出醜十鬧妓院忽來聖旨十一進忠諫五台進香十二羡繁華江南汗漫十三進豔姬舟中消魂十四盡愚忠深夜草疏十五感激刺孤注一擲十六進忠言賢後受侮十七言逆耳怒貶賢後十八遭險難禍生不測十九悲身世賢後落發二十建庵觀千里募資二十一談禪機話中有因二十二重遭難冤家路狹二十三救賢後名妓仗義二十四念舊情天良發現二十五信讒言暗施毒計二十六慘遭劫骨化灰燼一抱不平評論積習話説我們中國向來的習慣女子犯了七出的罪名他的丈夫便可把他休掉其實這種七出的罪名並不是確實根據塵律而成立的因為我們中國的風俗是夫權極重的女子在這夫權極重的時代給他丈夫的威權壓制著簡直毫無自由可言了所以女子犯了七出的罪名丈夫可以用七出的名義去休他可以不認這個女子做老婆但是反過來講男子假使有了不規的行為無論犯了七出八出甚而至於一千出一萬出女子卻不能不認這個男子做丈夫這樣很不平等的情形實在是很不合理的因為男子固然是個人女子也是個人怎麼男子有這種不講公理的大大威權那女子非但沒有威權便連他的幸福都給男子剝奪的乾乾淨淨唉人生不幸為女子身説起來真是可憐阿況且女子有七出的話説的也不很明瞭即使女子並沒有可出的行為男子也不妨東扯西拉硬牽到七出的話上去所謂欲加之罪何患無詞這樣説來那女子非但幸福都給男子的威權剝奪了便連他的生命也在男子的掌握之中那麼女子實在是很不安全的了不過這種休妻的行為也不是男子方面光榮的事情所以上中等之家對於女子雖也使了威權來壓制他但是七出八出的話卻不是常常挂在嘴邊的然而天下之大女子不幸給丈夫休掉也決不在少數不用説旁的身為皇帝何等尊嚴尚且不顧顔面把皇后休掉我們翻開曆史來看從古到現在不知有多少起了可見得生為女子無論生在皇帝家或是平民家都是一樣可憐的在下現在寫一段皇帝休妻的事情給列位看官茶餘酒後消遣消遣或許看到中間要説皇帝無情替可憐的皇后同掬傷心之淚哩間話少敘且説在下所寫這段皇帝休妻的事情也是前清時代的祕史書中主要人物當然是皇帝與皇后兩個人那皇帝是誰便是雍正皇帝的第四個兒子大名鼎鼎的乾隆皇帝那皇后是誰呢便是禁衛軍領侍衛內大臣富恆的女兒富察後原來乾隆皇帝沒有即位的時候還是個太子雍正皇帝便給他配上了富恆的女兒富察後後來雍正死了乾隆皇帝繼承了皇位便把富察後立為皇后那富後是很聰明很有才幹的人不過容貌差些乾隆皇帝因為富察後很有能耐便有些怕他早年時候他們兩人雖不見得如膠似漆卻也相安無事等到中年時候天下都很太平藩屬有叛逆不奉朝命的地方大兵所至群醜倒戈於是疆土一天大似一天武功震赫四夷賓服國內又是米賤薪廉民樂其業一般善於逢迎的臣僚利用這個機會大施他們做官的祕訣今天上奏明天上表説的話無非是諛頌升平一唱百和官職不論大小都是爭先恐後的上奏章看官請想甜蜜蜜的諛頌話誰不願意聽呢況且這時候乾隆皇帝也自以為功高望重非但前清開國所僅見即前代興邦建業的皇帝也不見得個個勝他所以見到一般臣僚諛頌的奏章益發的樂不可支於是漸漸的想到聲色方面去少不得有許多不顧廉恥的臣僚和一般宮監們猜透乾隆皇帝的心理出了許多主意進了許多計劃那乾隆皇帝所沒曾想到的事情他們都給他擺布了乾隆皇帝雖覺得非常稱心適意只是礙著富察後的耳目還不敢明目張膽的幹去二意相左帝後反目話説乾隆皇帝因為天下升平聽了滿耳諛頌的話很覺得非常得意以為天下是沒事了便專在聲色上用功夫一般不要臉的臣僚宮監們除了上奏章諛頌太平以外又進了許多行樂遊宴的方法宮內花草木石鳥獸池嶺本來是現成有的又有三宮六院無數的妃賓能彈的彈能唱的唱有的是貌豔於花有的是身輕如燕帝皇家哪一件沒有要怎樣便怎樣今天在這裏明天到那邊好不自在好不快樂不過乾隆皇帝恐怕富察後有什麼不樂意所以還不敢明目張膽鬼鬼祟祟的幹著往往熱鬧之中總有些顧慮漸漸的膽子大了政事也懶得辦了果然給富察後知道了以為滿盈招損決不是好現象便在乾隆面前竭力的規勸那乾隆皇帝原是很喜歡虛名的人聽了富察後的一番規勸心中雖很不樂意但是要顧全自己的虛名起見只得唯唯諾諾的答允著其實他這種答允並非出於至誠不過他恐怕為了規勸的事情和富察後傷了和氣豈不惹人家笑話即使人家不敢説什麼笑話也恐怕人家背後議論他他有這種客觀的念頭才能容忍富察後的規勸怎奈那富察後還不識好歹成天的在乾隆皇帝面前嘮叨使得乾隆皇帝忍無可忍不覺把從前容忍的心理漸漸的變做厭恨起來大凡人類的交際平常並沒見什麼好壞的心中尋於那人雖有不樂意的地方只要不發作出來到也可以糊裏糊塗的過去假使有一天揭破了假面具一頓發泄那就糟不堪言了那富察後既是給乾隆皇帝厭恨著便像放鞭炮似的引著那藥線了不過在這剛點著藥線還沒有引著火藥的時候雖然有些不樂觀的現象到還可以苟且旦夕所以這時候乾隆皇帝雖很厭恨富察後還不十分發作任憑富察後成天在耳朵邊嘮嘮叨叨他只是置之不理在他的心理原想言之諄諄聽之藐藐使得富察後知風識趣也不必太認真便將就些了誰知那富察後為人生性也有些古怪偏是乾隆皇帝越不要聽他越説越起徑看官們請想古語説道話不投機半句多現在乾隆皇帝和富察後兩人本來已是話不投機越説越不投機富察後卻偏有千言萬語教那乾隆皇帝怎樣能容忍呢所以直到後來乾隆皇帝忿怒的時候那才是好像放鞭炮引著火藥了放鞭炮引著了火藥劈劈拍拍響聲便不絶了在下把他們兩人這時候的感情作一個第一次的小結束便説這時候乃是他們兩人失和的起點將來因失和而口角因口角而批頰因批頰而足蹴因足蹴而休掉因休掉而富察後落發為尼直到後來富察後氣忿而死乾隆皇帝非但沒有念舊憐死之心竟忍心害理把一堆枯骨化成灰燼在下現在姑且把正文暫時擱起先把這段乾隆休妻的事情批評一下作為正文的開場看官們請聽著乾隆皇帝原是個英明有為的帝皇他的勳業確還不錯不過他私德不修對於德行上實在有些説不過去的看他對待富察後的前後情形真可以當得忠言逆耳無情無義八個字至於富察後雖然為忠進言因忠獲罪似乎很是可憐但他過於任性也未免太不識趣在下把這事交代明白間話就此剪斷下回便入正文三體仁宮猝然驚豔話説皇宮裏面妃嬪們本來是很多的乾隆皇帝在宮裏邊盡日看花東邊玩耍西邊歇宿也不管富察後嘮叨成天的和妃嬪們作樂取笑到也覺得很安逸光陰如箭不覺日子好久了乾隆皇帝玩得有些膩了因為皇宮裏面的許多妃嬪們雖沒有麻臉跛腳的醜娘子但也並沒有什麼絶世曠代的佳人乾隆皇帝起初和他們玩耍覺得都很合意等到日子既久才覺著這般妃嬪們都不是絶色的人材所以興致漸漸的闌珊了有一天正當暮春天氣乾隆皇帝在便殿上午睡醒來正想往西苑那邊去間步一回只見富察後站在禦榻旁邊乾隆皇帝靠在禦榻的龍柱上明知富察後又有一篇不堪入耳嘮叨話來壓住他的清興所以他只作沒曾看見富察後見他醒了又把眼睛閉著仿佛又要睡著的模樣也明知這是他的假做作一時等不耐煩便上前啓奏道陛下這幾天敢是龍體乏了嗎照奴的意思人生在世固然不妨及時行樂但是風流繁華都是轉眼一瞬罷了有什麼趣味可説陛下還是安息龍體為要乾隆皇帝不待他説完早便假作呼呼的一聲理也不理的睡了富察後惹了一場沒趣只得悄悄的走了乾隆皇帝等富察後走了以後也便離了禦榻攜著兩個小宮監直到體仁宮來原來那體仁宮的妃子名喚雲嬌所以便名雲妃生得到也不錯可算得皇呂內首屈一指因此很得乾隆皇帝的憐愛這天乾隆皇帝在雲妃那邊用了晚膳教宮女們吹吹彈彈作樂了半宵正待和雲妃解衣安歇忽然見著一名宮女手攜著一個絳紗燈站在寢宮外邊乾隆皇帝無意中接觸在眼簾中間覺得那宮女桃腮柳眉櫻口荑手生得很是俊俏並且身段雖不纖瘦溫潤卻和美玉琢成一般乾隆皇帝既把那宮女看個明白怎肯把機會失掉便傳旨喚入相見早有宮監們一聲吆喝那宮女慌忙進入跪在乾隆皇帝面前雲妃先開口問道你不是景明宮的宮婢美玉嗎來此何干好端端見過萬歲再説那宮女初次見駕慌得話也説不出依然跪倒塵埃頭都不敢擡起來乾隆皇帝見那宮女實在可愛便不管雲妃在旁一手攙了起來説道你名喚美玉固然是名副其實但既有這樣人材怎麼朕向未見過呢美玉低著粉頸曼聲啓奏道婢子是伏侍景明宮福妃的因為萬歲爺只到過景明宮兩回那時婢子奉了福妃的命來此請雲妃去談話不知萬歲駕適在此婢子鹵莽理應萬死説著又跪了下去一篇鶯啼燕語般的清聲柔語直樂得乾隆皇帝手舞足蹈便和雲妃説道景明宮有這樣人才朕幾乎把他錯過尚幸天緣巧合今晚在此相見朕實欣幸得很朕向以為六千粉黛除了卿卿以外直無可矚目的了誰知十步之內必有芳草朕得此女加上卿卿可謂美具難並了朕今想把他封為妃子便名為玉妃位在卿卿的次卿卿的意思怎樣雲妃聽了知道是對頭來了心裏當然非常不樂意但怕乾隆皇帝怪惱了自己又想事已至此也決不是自己能夠擺而脫的便乘此機會落得雙方做了個人情遂道美玉妹妹確是奴的良友似奴賤質陋容何及美玉妹妹的萬中之一萬歲英明擢拔奴實愈悅得很乾隆皇帝見雲妃並無妒忌之心很是快樂果然把美玉封做玉妃安置在昭清宮內等明天宴賀玉妃喜不自勝謝恩而退乾隆皇帝當晚便在雲妃那邊安歇四承恩澤玉妃專寵話説乾隆皇帝在體仁宮內見著景明宮的宮婢美玉驚為絶代佳人封做玉妃安置在昭清宮內當晚仍和體仁宮的雲妃歇宿一宿無話次日早起上朝議政完畢回到宮來便在昭清宮內安排禦宴早有各宮妃嬪齊來給玉妃賀喜又有一般宮女們歌舞吹彈好生熱鬧直到夜半才止乾隆皇帝便和玉妃定情那玉妃生性很是機詐又會諂媚一宵恩愛已把乾隆皇帝迷戀得死心塌地枕度這事不必細表春宵苦短不覺天光破曉紅日滿幃梳洗才罷乾隆皇帝傳旨頒賞許多珍品給玉妃收受一般妃嬪宮女和宮監們都知道玉妃是新承恩寵的妃子以為結歡玉妃便可在乾隆皇帝面前説些好話所以大家都是爭先恐後來趨奉玉妃一朝青雲得路好不得意只是苦了雲妃惱了富察後原來乾隆皇帝自從得著玉妃以後把雲妃冷落的置之腦後雲妃自己越想越氣無可奈何也只得放寬肚皮聽他們的便了惟有那富察後雖是個聰明的人但是他偏不知趣此番知道乾隆皇帝得了玉妃以為又可借題發揮進些忠諫了恰巧那天清早乾隆皇帝退朝回宮剛進宮門早有玉妃候著劈面又來了富察後玉妃因為他是皇后便上前行