常幹練上下行賄把這件案子耽延了好久日子了空又走通了太監的門路教太監去對玉妃説知説是了緣既已出家落發當然不能再回宮來不過皇上的允他帶回北京乃因皇上非常恨他想把他提回北京幽在別宮的倘然現在不等皇上回京先將他殺掉恐怕不是皇上的本意皇上到要反起疑忌的心了所以不如等皇上回京了再説玉妃聽太監説了這一大篇覺得很有理便傳命把了緣囚在內務府了緣進了內務府日夜把華嚴經作為他的功課端端地坐著也不吃飯每天不過喝些清水了空知道了緣在內務府非常受苦但也沒有救出他的辦法這時三姑娘還在北京開了一家妓院因為年長色衰自己做了掌匱的老鴇平日仗義疏財在京城地面很有俠名了空心想不如求救三姑娘或許可以幫些忙哩於是便上門求見三姑娘原是來者不拒的人見了了空聽得了空所説的話便跳了起來道平民家人夫妻尚且不能無緣無故的丟掉況是金枝玉葉的國母反可以隨隨便便的休掉嗎我早年時候雖是因為蓋史的事情受了皇后叔父的幾次欺梅論起來了緣也是我的仇人但是我為人是很直心任俠的既是了緣為了忠諫而獲罪的那也可算得是個賢後了現在他有了這種險難我倘不能救他一救我心終不能安況且我以德報怨更可以見到我三姑娘的人是究竟怎樣的哩了空見三姑娘義氣得很著實佩服之至三姑娘允了空沒法救助了緣以後立刻便聚集他手下的一班關西大漢那班關西大漢足有七八十人都是三姑娘平日拳養的所以一聽號令個個來到三姑娘自己裝束齊整領著一班關西大漢一直來到內務府那內務府來的大小辦事官員沒有一個不是久仰三姑娘的盛名的並且沒有一個不知道三姑娘和乾隆皇帝是有肌膚關係的所以三姑娘率領許多關西大漢來到門口怎敢攔阻只得讓他們直闖進去三姑娘遂呼他們進來見著了緣也不説什麼一聲令下七八十個關西大歎七手八腳的把了緣擡入轎子中間一直擡了出來回到三姑娘的家中二十四念舊情天良發現話説三姑娘受了空的囑託果然把了緣搶了回來了緣便在三姑娘處暫住到也可算是患難中的知己了隔了多時乾隆皇帝車駕回京玉妃便在乾隆皇帝面前造了許多謠言把了緣的事情裝頭裝腳的説了一遍乾隆皇帝果然便説去向內務府管事小臣要了緣這個人內務府的官員不敢説了緣是三姑娘搶去的只是説給強盜搶了去了乾隆皇帝心中未免有些疑心因為京城地面又是在內務府的衙門中間竟有白日搶人的事情發生便把內務府的管事大臣訓斥了一頓內務府的管事大臣只得領罪不提惟有玉妃在宮中聽得了緣給人搶去心中更是著惱現在利用乾隆皇帝訓斥內務府管事大臣的機會去請求乾隆皇帝捕治搶人的大盜乾隆皇帝當然是允承的但是這種強盜教京城內的官員怎樣的去捉所以耽延好久日子強盜的影子都沒捉到這時乾隆皇帝卻已知道了緣的搶去乃是三姑娘所做的事情這種消息是宮監小安給乾隆皇帝説明的但是乾隆皇帝想起當初和三姑娘的關係也很知道三姑娘是有能耐的人所以明知三姑娘把了緣搶了去自己卻假裝癡聾置之不問又過了好多天乾隆皇帝在宮中悶得有些乏味便又微服出遊來到三姑娘處間逛了空也在那邊了緣卻不便和乾隆皇帝見面所以暫時避在別室乾隆皇帝見著三姑娘和了空笑問道你們怎麼這樣的迫不及待甘心去做強盜犯這種應砍腦袋的罪呢三姑娘道我們倘然不去做強盜那麼皇上便要犯殺妻的罪哩所以寧可我們去做強盜免得皇上去犯罪這樣的忠義皇上不來獎賞反來責怪我們嗎乾隆皇帝聽著大笑道你可算得恃寵而驕中間最利害的人了三姑娘趁勢跪倒塵埃謝道皇上愛我們真是無所不至可見得天恩浩蕩但是我們既是深受恩寵獨有皇后卻忍心把他不沾些雨露嗎皇上倘不把他安置個妥當位置那一般宵小施起毒計來皇后的性命終是難保皇上也終不免殺妻的罪名婢子們不能不為皇上擔一分憂懼的現在有千載一時的機會皇上何不把皇后安置妥當使得將來永無後慮那才是皇上恩所賜的哩乾隆皇帝聽著點頭稱是三姑娘見乾隆皇帝已有念舊之心便和了空去攜了了緣出來相見乾隆皇帝天良發現便攙了了緣的手安慰了一番了緣卻不説他話只説但願皇上修德自愛使奴寬心才好乾隆皇帝聽了到很體恤了緣的苦處允許了緣即日迎歸坤寧宮了緣謝了道皇上恩典真有天般的大奴當然很是欣幸但自從皇上把奴放棄以來奴的心肝好似浮雲野鶴宮闈的禮節好久沒曾嫻習倘然脫了禮節或是因此而獲罪雖是奴的自作之孽但也決不是所以全皇上之恩所以皇上果能原諒奴的愚衷只望皇上指定一座觀庵使奴終此餘年奴便已感恩無窮的了乾隆皇帝聽著淒然的答允立刻便取過筆墨寫了一道敕書教了緣在揚州天寧寺主持並且令地方宜隨時供給糧食派人保護了緣有些際遇便謝恩而退乾隆皇帝當晚便在三姑娘處歇宿到了天初放亮的時候乾隆皇帝便自回宮不提三姑娘等乾隆皇帝走了以後便和了空了緣商量三人商議妥當了空便拿了乾隆皇帝的手敕伴送了緣南下三姑娘卻仍在北京這時乾隆皇帝又下一道詔書命江南的督撫隨時侍奉於是天下的人統都知道了緣便是從前已廢的皇后現在住在揚州的因此一般勢利官紳又是爭先恐後的來趨奉了二十五信讒言暗施毒計話説了緣奉旨在揚州天寧寺主持因為人家知道他是皇后出身又是奉旨出家的所以都來趨奉了緣嫌著應接太繁便在山林幽靜的地方另造了一所精舍也不和人家來往到也清間自在了空從此以來一年中間有時住在濟南有時住在揚州也很瀟灑並且他靠著從前侍寢的關係和三姑娘的勢力交通宮禁聲勢很是煊赫一般禦史老爺們吃飽了飯沒事可做便上疏請求捕治乾隆皇帝見到這種奏疏當然是置之不問便把奏疏擦桌子似的擦去了但玉妃知道了緣在揚州奉旨出家都是了空的緣故心中不覺大惱便和他的心腹黨羽商議報復的方法內有一名黨羽名喚阿帖榻官居內大臣乃是乾隆皇帝面前最親近的一個紅員阿帖榻奉了玉妃的命令便上前對乾隆皇帝説道那個尼姑了空不僧不俗挾了左道去惑人其實左道惑人其害猶小但是傳播皇上的罪惡其罪那才大哩皇上以為了空能盡忠謁誠的卻不知道他專把廢後和宮闈的祕事逢人便道的亂談亂説奴才的意思皇上何必因為愛了一個婦人使得惡名遠播呢乾隆皇帝聽著果然大惱但是掉過念頭一想想起已經允許他們自由倘然再去捕治豈不惹外省督撫的笑話乾隆皇帝向來作事原是貌為堯舜心同桀紂所以他又想起明做不如暗算便密令地方官先去探訪了空的蹤迹再暗地裏派了幾名力士乘機把了空殺掉想滅掉這種口了空也是隨時小心的人這種消息他便探聽的明明白白便去和三姑娘商量計策三姑娘説道我所以不離北京一步便是為了這個緣故因為北京的地面我的權力可以普及萬沒有他們下手的地方倘然出了這個範圍我便不能保了於是了空便住在三姑娘處不敢出頭露面足足住了兩年了空悶得很是煩惱幾番想南下到揚州去看一看了緣都給三姑娘阻住教他不要冒險了空便只得留著又隔了多時三姑娘的母親忽然死了三姑娘想到南海去做道場聚了一班關西大漢做了護衛防備的很是嚴密了空趁此機會想一同南下三姑娘難以推卻只得允許直到揚州見過了緣三姑娘請了緣同船往南海了緣恐怕出去招搖於自己很有不利所以不願同去了空便接著説道當初我因為有姦人暗算所以悶住三年直到現在才得南來但是現在三姑娘有許多護衛姦黨也不敢怎樣的我們現在年已快老倘再不到普院進香再遲幾年恐怕都要朽木了何不趁此一息尚存的時候偕謁靈山同參妙諦機會不可失的哩了緣不得已只得同去三人渡過長江宿在金山寺裏了緣恰巧有些小病臥床未起了空和三姑娘遍看金山寺的道場現身説法了一回道場完畢了空因為受了些香煙的悶味便攙了一名小尼姑登妙高臺上觀看長江的風景正在顧盼自樂的時候忽然有一個巨無霞似的莽男子直闖前來眼光直注了空看著了空也留心細看知道這人是玉妃身邊的一名宮監曾在禦船中見過的心中吃了一驚但想走避哪里還來得及那男子抽出一把尖刀對準了空的胸脯刺去了空吃著一刀仗著他本身的氣力便反手去掐他臂膊兩人便拼做一團站腳不住都跌下臺去那台下便是長江潮水卷來都入波心了小尼姑見這種情形早已嚇得魂飛魄散忙得奔告三姑娘和許多尼姑知道三姑娘領著尼姑們登臺一看哪里還有什麼影蹤只得歎息罷了二十六慘遭劫骨化灰燼話説三姑娘見了空給仇人捲入長江尸體毫無不覺大加恐慌只得嚴加防備並且想把了緣仍舊送到揚州免得也遭暗算但是恐怕了緣病中聽得了空出了亂子勢必要受驚恐所以祕著不説見著了緣只説了空有了他事大概隔幾天再往揚州了緣聽著怎能想到不測的事便獨自回揚州而去三姑娘等了緣回去以後便往普陀進香住了半月興景不敢久住便依路北上路經揚州了緣出來和三姑娘話別卻仍不見了空了緣心中不免疑慮三姑娘仍不直説兩人聚首了幾天三姑娘因為京城中還有許多事情沒有料理妥當所以便自起程回京了緣見三姑娘去了才盤問小尼姑道了空究竟是怎樣了小尼姑知道事已無可再祕只得把了空遭人暗殺的事情説了出來並且説道上回所以不説出真情乃是三姑娘所囑咐的現在他既回京所以才敢告知了緣聽著大驚道這定是玉妃派人來暗算的唉為了我竟害掉了他的生命教我怎樣的對得起他呢況且朋友已死我也義不獨生了了緣經此刺激從此以後便奄然成病病勢一天重似一天到後來了緣自知病入膏肓勢已危殆便掙起身子寫信去告訴三姑娘信裏面無非是些訣別的話還想請三姑娘設法去對乾隆皇帝説知千萬懇求乾隆皇帝原諒他些把他棺槨仍舊葬在陵園旁邊使得魂魄仍可依傍祖宗帝後了緣一方面寫信給三姑娘一方面又去對揚州地方官説明説是自己雖是負罪被廢但是皇上殊恩終不敢忘死後仍須先告朝廷以盡寸心致於應該怎樣的殯葬都聽皇上的聖旨罷了了緣囑咐完畢病勢益發沈重但是揚州地方官卻不敢貿然便去奏知這時三姑娘在京城內接到了緣的信便不分晝夜的趕到揚州恰巧了緣便在上一天死的三姑娘便督令揚州的地方官用皇后的禮節去棺殮地方官到了這時才去上疏報奏請旨送梓官北上這道奏疏送進北京乾隆皇帝見了雖然自己生平和皇后感情不好究竟有些香火之情到了死別的時候怎不哀悼所以便想用皇后的禮節去歸葬陵園怎奈冤家路狹玉妃這時已補了正宮皇后的職位聽了這個消息哪里肯容忍遂在乾隆皇帝的面前説道把已經出家的尼姑當做皇后看待怎能昭示天下哩乾隆皇帝聽著果然改變了初心下旨道彼既居外無發不得以後禮祭葬古今豈有無發之國母哉應照僧尼葬法火化滅迹這旨下後揚州的地方官果然把了緣從棺槨中間倒了出來放起一把無情火把了緣的尸身燒得肢爛身毀究竟人體不比稻柴放起火來一時也難燒乾淨燒了半天留下許多枯骨殘肉揚州的地方官把了緣餘骨草草地埋在寺後的塔下地主官事情辦妥進表奏知乾隆皇帝又下了一道密旨教揚州的地方官把這事祕密著千萬不可説出來倘然走漏風聲罪必不輕看官們請想一想專制時代皇帝旨意誰敢違忤所以地方官都是緘口不敢言一般小百姓們更是無從知道大家都以為必是妖婦冒稱宮人才用火葬滅迹地不知道一生吃苦死了還把尸身火掉的人便是那位賢德的富察後哩三姑娘眼看這種傷盡天良忍心害的事情本想給富察後出口氣只因前清運氣方盛無從下手便發憤出得關來後遂不知所終大概是流為劍俠一派的人了乾隆皇帝後來傳位太子不到幾年也便死了卻不知道乾隆皇帝死了以後見著富察後可有什麼面目相見
